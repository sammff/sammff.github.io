<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio Web - Medio Ambiente</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Marco Izquierdo (Menú de Navegación) */
        .marco-izquierdo {
            width: 20%;
            height: 100vh;
            background-color: #2E7D32; /* Fondo verde oscuro */
            color: white;
            padding: 30px 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .marco-izquierdo h2 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 2px solid white;
            padding-bottom: 10px;
        }
        .marco-izquierdo ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .marco-izquierdo li {
            margin-bottom: 15px;
        }
        .marco-izquierdo button {
            width: 100%;
            background: none;
            border: 2px solid transparent;
            color: white;
            padding: 10px;
            font-size: 18px;
            text-align: left;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .marco-izquierdo button:hover {
            background-color: #4CAF50;
            border-color: white;
        }

        /* Contenedor del Centro (Carga las páginas principales) */
        .contenido-central {
            width: 65%;
            height: 100vh;
            border: none;
        }

        /* Marco Derecho (Banner estático) */
        .marco-derecho {
            width: 15%;
            height: 100vh;
            background-color: #4CAF50; /* Fondo verde claro */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            writing-mode: vertical-rl; /* Texto vertical elegante */
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="marco-izquierdo">
        <h2>PRINCIPAL</h2>
        <ul>
            <li><button onclick="cargarPagina('cuidado.html')">🌍 Cuidado</button></li>
            <li><button onclick="cargarPagina('composta.html')">🌱 Composta</button></li>
            <li><button onclick="cargarPagina('reciclaje.html')">♻️ Reciclaje</button></li>
        </ul>
    </div>
    
    <iframe id="pantalla-principal" class="contenido-central" src="cuidado.html"></iframe>

    <div class="marco-derecho">
        MEDIO AMBIENTE
    </div>

    <script>
        function cargarPagina(url) {
            document.getElementById('pantalla-principal').src = url;
        }
    </script>

</body>
</html>
